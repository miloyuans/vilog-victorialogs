app:
  name: vilog-victorialogs
  environment: development

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 15s
  trusted_proxies: []

mongo:
  uri: mongodb://localhost:27017
  database: vilog_victorialogs
  connect_timeout: 10s
  ping_timeout: 3s

logging:
  level: info
  development: true

cache:
  query_ttl: 300s
  service_list_ttl: 1800s
  tag_values_ttl: 1800s

victorialogs:
  request_retries: 1
  discovery_limit: 200
  tag_value_limit: 200

security:
  trust_proxy_headers: false
  whitelist: []
  rate_limit_rps: 0
  rate_limit_burst: 0

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
  api_base_url: https://api.telegram.org
  send_timeout: 5s

discovery:
  startup_enabled: true
  window: 24h
  concurrency: 4

retention:
  scheduler_enabled: false
  max_delete_tasks_per_day: 1
  max_delete_range_days: 30
  delete_timeout: 10s
  poll_interval: 30s
